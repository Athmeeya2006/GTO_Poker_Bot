name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip check

      - name: Run ALL tests (Kuhn + Leduc + opponent model + trading + exploitability)
        run: python -m pytest tests/ -v --tb=short

      - name: Run full pipeline
        run: python notebooks/run_everything.py

      - name: Verify game engine imports
        run: python -c "from core.game_engine import KuhnPokerBot; print('Game engine OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Type-check critical modules
        run: |
          python -c "
          import ast, sys
          errors = []
          files = [
            'core/cfr.py', 'core/cfr_plus.py', 'core/dcfr.py',
            'core/mccfr.py', 'core/exploitability.py', 'core/kuhn_poker.py',
            'core/leduc_poker.py', 'core/game_engine.py',
            'opponent_model/dirichlet_model.py', 'opponent_model/hypothesis_test.py',
            'opponent_model/strategy_mixer.py', 'opponent_model/range_model.py',
            'trading/glosten_milgrom.py',
          ]
          for f in files:
              try:
                  with open(f) as fh:
                      ast.parse(fh.read())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('Syntax errors found:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print(f'All {len(files)} files parse OK')
          "
